name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verificar dependências
        run: mvn dependency:resolve

      - name: Compilar o projeto
        run: mvn clean compile

      - name: Executar os testes unitários
        run: mvn test

      - name: Validar a qualidade do código no SonarQube Cloud
        run: mvn sonar:sonar -Dsonar.projectKey=Battleship -Dsonar.organization=bytefleet -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Construir a imagem Docker
        run: docker build -t battleship-game:latest .

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publicar a imagem no Docker Hub
        run: |
          docker tag battleship-game:latest ${{ secrets.DOCKERHUB_USERNAME }}/battleship-game:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/battleship-game:latest

      - name: Gerar documentação (Site e Javadoc)
        run: mvn site

      - name: Atualizar a documentação no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
